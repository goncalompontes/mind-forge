name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ poppler-utils
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
